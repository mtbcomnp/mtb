<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Free resources" />
  <title>Welcome — mtb</title>
  <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css" />
  <link rel="stylesheet" href="assets/css/mtb.css" />

      <a href="https://mtb.com.np" class="nav-logo">mtb</a>

      <!-- Search trigger -->
      <button class="search-trigger" id="search-trigger" aria-label="Search (Ctrl+K)">
        <i class="ti-search"></i>
        <span class="search-trigger-text">Search…</span>
        <kbd>Ctrl K</kbd>
      </button>
    </div>

    <div class="nav-right">
      <a href="https://mtb.com.np" class="nav-link">Home</a>
      <a href="downloads.html" class="nav-link active">Resources</a>
      <a href="mailto:info@mtb.com.np" class="nav-link">Contact</a>

      <div class="nav-divider"></div>

      <!-- Icon links -->

        </svg>
      </a>
      <a href="mailto:info@mtb.com.np" class="nav-icon" title="Email">
        <i class="ti-email"></i>
      </a>
    </div>

    <!-- Mobile hamburger -->
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div class="nav-mobile" id="nav-mobile">
    <a href="https://mtb.com.np" class="nav-link">Home</a>
    <a href="downloads.html" class="nav-link active">Resources</a>
    <a href="mailto:info@mtb.com.np" class="nav-link">Contact</a>
    <div class="nav-mobile-icons">
      <a href="https://github.com/themtb" class="nav-icon" target="_blank" rel="noopener">

        GitHub
      </a>
      <a href="mailto:info@mtb.com.np" class="nav-icon"><i class="ti-email"></i> Email</a>
    </div>
  </div>

  <!-- ── SEARCH OVERLAY ───────────────────────────────────────────── -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-modal">
      <div class="search-modal-inner">
        <i class="ti-search search-modal-icon"></i>
        <input type="text" id="search-modal-input" class="search-modal-input" placeholder="Search resources…" autocomplete="off" />
        <button class="search-modal-close" id="search-close" aria-label="Close"><kbd>Esc</kbd></button>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- ── PAGE HEADER ─────────────────────────────────────────────── -->
  <header class="page-header">
    <div class="container">
      <h1 class="page-title"> Resources </h1>
      <p class="page-sub"> </p>
    </div>
  </header>

  <!-- ── MAIN ────────────────────────────────────────────────────── -->
  <main class="main-content">
    <div class="container">

      <!-- Filter pills -->
      <div class="filter-row">
        <div class="filter-pills" id="filter-pills">
          <!-- injected by JS -->
        </div>
        <select id="sort-select" class="sort-select">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="name">A–Z</option>
        </select>
      </div>

      <!-- Results count -->
      <p class="results-count" id="results-count"></p>

      <!-- Card grid -->
      <div class="card-grid" id="card-grid"></div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" hidden>
        <p>Nothing matches. <button class="link-btn" id="reset-btn">Clear filters</button></p>
      </div>

    </div>
  </main>

  <script src="assets/js/mtb.js"></script>
</body>
</html>
